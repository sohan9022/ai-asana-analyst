name: MLOps Production Pipeline

on:
  push:
    branches: [ master ]

jobs:
  train-evaluate-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train Model
      run: python train.py

    - name: Evaluate Model
      run: python evaluate.py 

    - name: Create GitHub Release and Upload Model
      if: success()
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: model-v${{ github.run_number }}
        name: Yoga Pose Model v${{ github.run_number }}
        body: "Automated model training successful. Model accuracy exceeds 70% threshold."
        files: app/engine/yoga_pose_model.keras

    - name: Run Analysis
      if: success()
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: PYTHONPATH=. python app/report/report_generator.py
